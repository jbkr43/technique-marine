name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          include-hidden-files: true
          retention-days: 3

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  full:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test full
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7

  report:
    needs: full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          enable_jekyll: false
          publish_branch: gh-pages
          user_name: github-actions
          user_email: github-actions@github.com

  deploy:
    needs: [smoke, full]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Resolve deployment target
        id: deploy-target
        env:
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          REMOTE_DIR="${FTP_REMOTE_DIR:-}"
          REMOTE_DIR="${REMOTE_DIR#/}"
          REMOTE_DIR="${REMOTE_DIR%/}"

          if [ -z "$REMOTE_DIR" ]; then
            echo "server_dir=/" >> "$GITHUB_OUTPUT"
          else
            echo "server_dir=/${REMOTE_DIR}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dotfiles and new directories (bypasses FTP action limitations)
        continue-on-error: true
        env:
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          REMOTE_DIR="${FTP_REMOTE_DIR:-}"
          REMOTE_DIR="${REMOTE_DIR#/}"
          REMOTE_DIR="${REMOTE_DIR%/}"

          if [ -z "$REMOTE_DIR" ]; then
            TARGET_BASE="ftp://$FTP_HOST/"
          else
            TARGET_BASE="ftp://$FTP_HOST/$REMOTE_DIR/"
          fi

          if [ -f "dist/.htaccess" ]; then
            curl -T "dist/.htaccess" "${TARGET_BASE}.htaccess" \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              --ssl-reqd --insecure || true
          fi

          if [ -f "dist/.nojekyll" ]; then
            curl -T "dist/.nojekyll" "${TARGET_BASE}.nojekyll" \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              --ssl-reqd --insecure || true
          fi

          if [ -f "dist/privacy/index.html" ]; then
            curl -T "dist/privacy/index.html" "${TARGET_BASE}privacy/index.html" \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              --ssl-reqd --insecure || true
          fi

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ steps.deploy-target.outputs.server_dir }}

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      # Accept a comma-separated list of recipient emails in the secret EMAIL_TO
      RECIPIENTS: ${{ secrets.EMAIL_TO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare commit summary
        id: summary
        run: |
          BEFORE=${{ github.event.before }}
          AFTER=${{ github.sha }}
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            git --no-pager log -n 10 --pretty=format:"- %h %s (%an)" HEAD > commits.txt || true
          else
            git --no-pager log --pretty=format:"- %h %s (%an)" $BEFORE..$AFTER > commits.txt || true
          fi
          echo "subject=Deployment to ${{ github.ref }} ($AFTER)" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "The following commits were deployed:" >> $GITHUB_OUTPUT
          cat commits.txt >> $GITHUB_OUTPUT
          echo "\n--\nView on GitHub: https://github.com/${{ github.repository }}/commit/$AFTER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send deployment email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.summary.outputs.subject }}
          body: ${{ steps.summary.outputs.body }}
          to: ${{ env.RECIPIENTS }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
