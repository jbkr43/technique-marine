name: Test Email

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Optional comma-separated recipient list (overrides EMAIL_TO secret)'
        required: false
        default: ''
  push:
    branches:
      - 1-implement-google-analytics-to-site
    paths:
      - '.github/workflows/test-email.yml'

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send test email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Test Email: ${{ github.repository }} (#${{ github.run_number }})"
          body: |
            This is a test email from repository ${{ github.repository }}.
            Actor: ${{ github.actor }}
            Run: ${{ github.run_number }}
            SHA: ${{ github.sha }}
            If you received this, the SMTP settings and secrets are valid.
          to: ${{ inputs.to && inputs.to || secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
